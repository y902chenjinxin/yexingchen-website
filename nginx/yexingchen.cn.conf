# 叶兴辰的个人网站 - Nginx 配置
# 保存到 /etc/nginx/sites-available/yexingchen.cn

server {
    listen 80;
    server_name yexingchen.cn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yexingchen.cn;

    ssl_certificate /etc/nginx/ssl/yexingchen.cn.crt;
    ssl_certificate_key /etc/nginx/ssl/yexingchen.cn.key;

    # 前端静态文件
    root /var/www/yexingchen/dist;
    index index.html;

    # 前端路由（SPA）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 500M;
    }

    # 音乐文件（可公开访问）
    location /uploads/music/ {
        alias /var/www/yexingchen/uploads/music/;
        expires 30d;
        add_header Access-Control-Allow-Origin *;
    }

    # 小说文件
    location /uploads/novels/ {
        alias /var/www/yexingchen/uploads/novels/;
        expires 30d;
    }

    # 视频封面
    location /uploads/covers/ {
        alias /var/www/yexingchen/uploads/covers/;
        expires 30d;
    }

    # 上传目录（受保护）
    location /uploads/ {
        alias /var/www/yexingchen/uploads/;
        internal;
    }

    # 背景音乐
    location /music/ {
        alias /var/www/yexingchen/uploads/music/;
        expires 30d;
        add_header Access-Control-Allow-Origin *;
    }

    # 日志
    access_log /var/log/nginx/yexingchen_access.log;
    error_log /var/log/nginx/yexingchen_error.log;
}