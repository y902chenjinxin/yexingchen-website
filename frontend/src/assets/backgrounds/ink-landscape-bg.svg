<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- 水墨晕染 - 核心滤镜 -->
    <filter id="inkBleed" x="-15%" y="-10%" width="130%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="5" seed="15" result="noise"/>
      <feDisplacementMap in="blur1" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="1.5"/>
    </filter>
    <!-- 远山水墨晕染 -->
    <filter id="farInk" x="-20%" y="-10%" width="140%" height="120%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <!-- 中景山晕染 -->
    <filter id="midInk" x="-15%" y="-8%" width="130%" height="115%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <!-- 近景山晕染 -->
    <filter id="nearInk" x="-10%" y="-5%" width="120%" height="110%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- 云雾大晕染 -->
    <filter id="mist" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <!-- 星光柔光 -->
    <filter id="starGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 宣纸 -->
    <filter id="xuanPaper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
    <!-- 月晕 -->
    <radialGradient id="moonAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(220,210,190,0.12)"/>
      <stop offset="40%" stop-color="rgba(180,175,160,0.05)"/>
      <stop offset="100%" stop-color="rgba(100,130,150,0)"/>
    </radialGradient>
    <!-- 夜天 -->
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020509"/>
      <stop offset="40%" stop-color="#050a12"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <!-- 山1 -->
    <linearGradient id="m1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3040"/>
      <stop offset="100%" stop-color="#0d1a25"/>
    </linearGradient>
    <!-- 山2 -->
    <linearGradient id="m2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#152838"/>
      <stop offset="100%" stop-color="#081520"/>
    </linearGradient>
    <!-- 山3 -->
    <linearGradient id="m3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3848"/>
      <stop offset="100%" stop-color="#0c2030"/>
    </linearGradient>
    <!-- 云海 -->
    <linearGradient id="csea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(15,30,40,0)"/>
      <stop offset="40%" stop-color="rgba(20,38,48,0.35)"/>
      <stop offset="100%" stop-color="rgba(25,48,60,0.65)"/>
    </linearGradient>
  </defs>

  <!-- 夜空 -->
  <rect width="1920" height="1080" fill="url(#nightSky)"/>

  <!-- 月华 -->
  <circle cx="1550" cy="90" r="220" fill="url(#moonAura)"/>
  <!-- 月 -->
  <circle cx="1550" cy="90" r="32" fill="rgba(230,220,200,0.07)"/>
  <circle cx="1550" cy="90" r="24" fill="rgba(240,230,210,0.04)"/>

  <!-- 远山 -->
  <path d="M-100,620 Q60,480 200,550 Q380,400 560,480 Q740,330 960,420 Q1180,310 1400,400 Q1600,300 1850,370 Q1960,340 2000,360 L2000,1080 L-100,1080 Z"
        fill="url(#m1)" filter="url(#farInk)"/>
  <path d="M-100,680 Q80,540 240,610 Q420,470 620,550 Q820,400 1040,490 Q1260,380 1480,460 Q1700,350 1950,420 L2000,1080 L-100,1080 Z"
        fill="rgba(8,18,28,0.5)" filter="url(#farInk)"/>

  <!-- 中景山 -->
  <path d="M-100,780 Q100,640 280,710 Q480,560 700,650 Q920,500 1160,590 Q1400,460 1660,550 Q1860,470 2000,510 L2000,1080 L-100,1080 Z"
        fill="url(#m2)" filter="url(#midInk)"/>
  <path d="M-100,840 Q140,720 320,780 Q520,650 740,730 Q980,580 1240,670 Q1500,550 1760,640 Q1920,580 2000,600 L2000,1080 L-100,1080 Z"
        fill="rgba(10,22,32,0.6)" filter="url(#midInk)"/>

  <!-- 近景山 -->
  <path d="M-100,920 Q160,820 360,880 Q560,780 780,850 Q1020,760 1280,840 Q1540,780 1800,860 Q1940,830 2000,840 L2000,1080 L-100,1080 Z"
        fill="url(#m3)" filter="url(#nearInk)"/>
  <path d="M-100,960 Q200,880 420,930 Q640,860 880,910 Q1140,850 1420,910 Q1680,870 1920,930 L2000,1080 L-100,1080 Z"
        fill="rgba(15,30,40,0.75)" filter="url(#nearInk)"/>

  <!-- 云海 -->
  <ellipse cx="960" cy="1080" rx="1500" ry="360" fill="url(#csea)" filter="url(#mist)">
    <animate attributeName="rx" values="1500;1580;1500;1420;1500" dur="25s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.92;1;0.92;0.88;0.92" dur="16s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 左侧云 -->
  <ellipse cx="150" cy="1020" rx="580" ry="260" fill="rgba(18,35,45,0.55)" filter="url(#mist)">
    <animate attributeName="cx" values="150;220;150;80;150" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.65;0.5;0.42;0.5" dur="13s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="300" cy="920" rx="420" ry="160" fill="rgba(22,40,50,0.3)" filter="url(#mist)">
    <animate attributeName="cx" values="300;360;300;240;300" dur="16s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 右侧云 -->
  <ellipse cx="1780" cy="1040" rx="540" ry="240" fill="rgba(18,35,45,0.5)" filter="url(#mist)">
    <animate attributeName="cx" values="1780;1710;1780;1850;1780" dur="18s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1620" cy="900" rx="400" ry="150" fill="rgba(21,38,48,0.28)" filter="url(#mist)">
    <animate attributeName="cx" values="1620;1570;1620;1670;1620" dur="14s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 顶部薄雾 -->
  <rect x="0" y="0" width="1920" height="200" fill="rgba(5,12,20,0.25)"/>

  <!-- 星辰 -->
  <g filter="url(#starGlow)">
    <circle cx="120" cy="50" r="2.4" fill="rgba(225,215,195,0.85)"><animate attributeName="opacity" values="0.7;1;0.7;0.45;0.7" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="80" r="2" fill="rgba(220,210,190,0.75)"><animate attributeName="opacity" values="0.55;1;0.55;0.4;0.55" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="35" r="2.2" fill="rgba(222,212,192,0.8)"><animate attributeName="opacity" values="0.6;1;0.6;0.42;0.6" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="100" r="1.9" fill="rgba(218,208,188,0.72)"><animate attributeName="opacity" values="0.52;0.92;0.52;0.38;0.52" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="50" r="2.3" fill="rgba(224,214,194,0.78)"><animate attributeName="opacity" values="0.62;1;0.62;0.44;0.62" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1350" cy="130" r="1.8" fill="rgba(216,206,186,0.68)"><animate attributeName="opacity" values="0.48;0.85;0.48;0.35;0.48" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="1750" cy="65" r="2.1" fill="rgba(221,211,191,0.76)"><animate attributeName="opacity" values="0.58;0.98;0.58;0.4;0.58" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="1900" cy="150" r="1.6" fill="rgba(215,205,185,0.65)"><animate attributeName="opacity" values="0.45;0.8;0.45;0.32;0.45" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="170" r="1.3" fill="rgba(210,200,180,0.55)"><animate attributeName="opacity" values="0.35;0.65;0.35;0.25;0.35" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="150" r="1.2" fill="rgba(208,198,178,0.5)"><animate attributeName="opacity" values="0.3;0.6;0.3;0.22;0.3" dur="5.2s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="190" r="1.4" fill="rgba(211,201,181,0.54)"><animate attributeName="opacity" values="0.34;0.62;0.34;0.24;0.34" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="120" r="1.1" fill="rgba(207,197,177,0.48)"><animate attributeName="opacity" values="0.28;0.55;0.28;0.2;0.28" dur="5.8s" repeatCount="indefinite"/></circle>
    <circle cx="1260" cy="190" r="1.3" fill="rgba(209,199,179,0.52)"><animate attributeName="opacity" values="0.32;0.6;0.32;0.23;0.32" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="1580" cy="170" r="1.2" fill="rgba(208,198,178,0.5)"><animate attributeName="opacity" values="0.3;0.58;0.3;0.22;0.3" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1820" cy="210" r="1.1" fill="rgba(206,196,176,0.46)"><animate attributeName="opacity" values="0.28;0.52;0.28;0.2;0.28" dur="6.2s" repeatCount="indefinite"/></circle>
    <!-- 尘星 -->
    <circle cx="60" cy="100" r="0.9" fill="rgba(198,190,172,0.38)"/>
    <circle cx="400" cy="20" r="0.8" fill="rgba(196,188,170,0.34)"/>
    <circle cx="700" cy="130" r="0.9" fill="rgba(199,191,173,0.38)"/>
    <circle cx="960" cy="80" r="0.8" fill="rgba(197,189,171,0.35)"/>
    <circle cx="1180" cy="160" r="0.9" fill="rgba(198,190,172,0.37)"/>
    <circle cx="1480" cy="50" r="0.8" fill="rgba(196,188,170,0.33)"/>
    <circle cx="1860" cy="90" r="0.9" fill="rgba(199,191,173,0.36)"/>
    <circle cx="200" cy="230" r="0.8" fill="rgba(196,188,170,0.32)"/>
    <circle cx="860" cy="240" r="0.9" fill="rgba(198,190,172,0.37)"/>
    <circle cx="1500" cy="230" r="0.8" fill="rgba(197,189,171,0.34)"/>
  </g>

  <!-- 灵气底光 -->
  <ellipse cx="960" cy="750" rx="900" ry="280" fill="rgba(35,75,80,0.07)" filter="url(#mist)">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 宣纸纹理 -->
  <rect width="1920" height="1080" fill="rgba(175,162,148,0.02)" filter="url(#xuanPaper)"/>
</svg>