<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="sgM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8d8b8"/>
      <stop offset="100%" stop-color="#5bb872"/>
    </linearGradient>
    <linearGradient id="ggM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5cb865"/>
      <stop offset="100%" stop-color="#3a9548"/>
    </linearGradient>
    <linearGradient id="rgM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a5a4a"/>
      <stop offset="100%" stop-color="#3a2a1a"/>
    </linearGradient>
    <linearGradient id="bgM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a5a9a"/>
      <stop offset="100%" stop-color="#5a3a7a"/>
    </linearGradient>
    <filter id="shM" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <radialGradient id="clM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- 透明背景 -->
  <rect width="400" height="280" fill="none"/>

  <!-- 远处云 -->
  <ellipse cx="50" cy="40" rx="45" ry="18" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="355" cy="50" rx="38" ry="14" fill="rgba(255,255,255,0.3)"/>

  <!-- 岛屿阴影 -->
  <ellipse cx="200" cy="250" rx="125" ry="14" fill="rgba(0,0,0,0.25)">
    <animate attributeName="ry" values="14;11;14" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 岩石底座 -->
  <g filter="url(#shM)">
    <path d="M55,240 L85,158 L315,158 L345,240 L330,255 L70,255 Z" fill="url(#rgM)"/>
    <path d="M85,158 L72,175 L70,255 L98,255 L100,165 Z" fill="#4a3a2a" opacity="0.3"/>
    <path d="M315,158 L328,175 L330,255 L302,255 L300,165 Z" fill="#4a3a2a" opacity="0.3"/>
  </g>

  <!-- 岩石裂纹 -->
  <path d="M125,175 L133,198 M185,170 L180,198 M255,172 L262,200" stroke="#2a1a0a" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- 草地 -->
  <path d="M70,158 Q80,148 200,140 Q320,148 330,158 L330,152 Q320,140 200,132 Q80,140 70,152 Z" fill="url(#ggM)"/>

  <!-- 古琴亭 -->
  <g transform="translate(155,68)">
    <rect x="12" y="32" width="7" height="48" fill="#8a7a6a"/>
    <rect x="68" y="32" width="7" height="48" fill="#8a7a6a"/>
    <rect x="10" y="28" width="65" height="6" fill="#7a6a5a"/>
    <path d="M-5,28 L37,-2 L80,28 Z" fill="url(#bgM)"/>
    <path d="M-8,28 Q5,18 37,-6 Q70,18 85,28" stroke="#9a7aba" stroke-width="2.5" fill="none"/>
    <rect x="16" y="68" width="52" height="4" fill="#9a8a7a" rx="1"/>
    <ellipse cx="38" cy="52" rx="22" ry="7" fill="#3a2a5a"/>
    <ellipse cx="38" cy="50" rx="20" ry="6" fill="#4a3a6a"/>
    <line x1="20" y1="49" x2="56" y2="49" stroke="#d8c8e8" stroke-width="0.5"/>
    <line x1="22" y1="51" x2="54" y2="51" stroke="#d8c8e8" stroke-width="0.5"/>
    <line x1="24" y1="53" x2="52" y2="53" stroke="#d8c8e8" stroke-width="0.5"/>
  </g>

  <!-- 竹林 -->
  <g transform="translate(45,100)">
    <path d="M18,65 Q22,42 16,12" stroke="#2d6b3a" stroke-width="4" fill="none"/>
    <path d="M32,65 Q36,48 32,22" stroke="#2d6b3a" stroke-width="4" fill="none"/>
    <path d="M46,65 Q50,52 46,32" stroke="#2d6b3a" stroke-width="4" fill="none"/>
    <ellipse cx="12" cy="10" rx="8" ry="3" fill="#4a9c5d" transform="rotate(-28,12,10)"/>
    <ellipse cx="26" cy="6" rx="7" ry="2.5" fill="#3d8b4f" transform="rotate(22,26,6)"/>
    <ellipse cx="40" cy="18" rx="8" ry="3" fill="#4a9c5d" transform="rotate(-18,40,18)"/>
  </g>

  <g transform="translate(305,105)">
    <path d="M16,62 Q20,40 14,15" stroke="#2d6b3a" stroke-width="4" fill="none"/>
    <path d="M30,62 Q34,46 30,25" stroke="#2d6b3a" stroke-width="4" fill="none"/>
    <ellipse cx="10" cy="12" rx="8" ry="3" fill="#4a9c5d" transform="rotate(28,10,12)"/>
    <ellipse cx="24" cy="8" rx="7" ry="2.5" fill="#3d8b4f" transform="rotate(-22,24,8)"/>
  </g>

  <!-- 音符 -->
  <g opacity="0.8">
    <text x="335" y="85" font-size="16" fill="#9a7aba">♪</text>
    <text x="50" y="78" font-size="12" fill="#9a7aba">♫</text>
  </g>

  <!-- 云雾 -->
  <ellipse cx="85" cy="258" rx="65" ry="18" fill="url(#clM)">
    <animate attributeName="cx" values="85;75;85" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="265" rx="80" ry="22" fill="url(#clM)">
    <animate attributeName="cx" values="200;190;200" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="315" cy="255" rx="55" ry="15" fill="url(#clM)">
    <animate attributeName="cx" values="315;325;315" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 光点 -->
  <circle cx="125" cy="120" r="1.5" fill="#e8d8f8" opacity="0.5">
    <animate attributeName="cy" values="120;115;120" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="105" r="1" fill="#d8e8f8" opacity="0.4">
    <animate attributeName="cy" values="105;100;105" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>