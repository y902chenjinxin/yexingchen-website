<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#E0F0FF"/>
    </linearGradient>
    <linearGradient id="island-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8FBC8F"/>
      <stop offset="100%" style="stop-color:#2E8B57"/>
    </linearGradient>
    <linearGradient id="guqin-wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D2691E"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="400" fill="url(#sky)"/>

  <!-- Clouds -->
  <g fill="rgba(255,255,255,0.9)">
    <ellipse cx="60" cy="80" rx="50" ry="25"/>
    <ellipse cx="90" cy="75" rx="40" ry="20"/>
    <ellipse cx="340" cy="100" rx="45" ry="22"/>
    <ellipse cx="310" cy="95" rx="35" ry="18"/>
    <ellipse cx="200" cy="60" rx="60" ry="25"/>
  </g>

  <!-- Island base -->
  <ellipse cx="200" cy="320" rx="140" ry="40" fill="url(#island-base)" filter="url(#shadow)"/>
  <ellipse cx="200" cy="310" rx="120" ry="30" fill="#3CB371"/>

  <!-- Bamboo trees -->
  <g stroke="#228B22" stroke-width="3" fill="none">
    <path d="M80 310 Q85 280 80 250"/>
    <path d="M85 310 Q90 275 85 240"/>
    <path d="M75 310 Q70 285 75 260"/>
    <path d="M320 310 Q315 280 320 245"/>
    <path d="M325 310 Q330 275 325 240"/>
    <path d="M315 310 Q310 285 315 255"/>
  </g>
  <!-- Bamboo leaves -->
  <g fill="#228B22">
    <ellipse cx="80" cy="245" rx="12" ry="5" transform="rotate(-30 80 245)"/>
    <ellipse cx="85" cy="235" rx="10" ry="4" transform="rotate(25 85 235)"/>
    <ellipse cx="75" cy="255" rx="11" ry="4" transform="rotate(-20 75 255)"/>
    <ellipse cx="320" cy="240" rx="12" ry="5" transform="rotate(30 320 240)"/>
    <ellipse cx="325" cy="235" rx="10" ry="4" transform="rotate(-25 325 235)"/>
  </g>

  <!-- Guqin (Chinese zither) - main instrument -->
  <g filter="url(#shadow)">
    <!-- Table -->
    <rect x="120" y="260" width="160" height="20" rx="3" fill="url(#guqin-wood)"/>
    <rect x="115" y="255" width="170" height="8" rx="2" fill="#A0522D"/>

    <!-- Bridge -->
    <rect x="145" y="240" width="8" height="25" fill="#654321"/>
    <rect x="247" y="240" width="8" height="25" fill="#654321"/>

    <!-- Strings -->
    <g stroke="#C0C0C0" stroke-width="0.8">
      <line x1="120" y1="258" x2="280" y2="258"/>
      <line x1="120" y1="263" x2="280" y2="263"/>
      <line x1="120" y1="268" x2="280" y2="268"/>
      <line x1="120" y1="273" x2="280" y2="273"/>
      <line x1="120" y1="278" x2="280" y2="278"/>
    </g>

    <!-- Decorative patterns -->
    <rect x="180" y="258" width="40" height="15" rx="2" fill="#DEB887" opacity="0.5"/>
    <circle cx="200" cy="265" r="4" fill="#8B4513" opacity="0.6"/>
  </g>

  <!-- Small music notes floating -->
  <g fill="#4A4A4A" font-family="serif" font-size="24">
    <text x="50" y="150">♪</text>
    <text x="330" y="130">♫</text>
    <text x="290" y="170">♪</text>
    <text x="70" y="180">♫</text>
  </g>

  <!-- Floating platform decorations -->
  <circle cx="200" cy="200" r="3" fill="#FFD700"/>
  <circle cx="150" cy="220" r="2" fill="#FFD700"/>
  <circle cx="250" cy="215" r="2" fill="#FFD700"/>
</svg>