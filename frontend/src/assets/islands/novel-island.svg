<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5DC"/>
      <stop offset="100%" style="stop-color:#FAEBD7"/>
    </linearGradient>
    <linearGradient id="island2-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DEB887"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    <linearGradient id="bamboo-scroll" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5F5DC"/>
      <stop offset="100%" style="stop-color:#FAEBD7"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Warm sky background -->
  <rect width="400" height="400" fill="url(#sky2)"/>

  <!-- Misty atmosphere -->
  <ellipse cx="200" cy="300" rx="180" ry="60" fill="rgba(255,250,240,0.5)"/>

  <!-- Island base -->
  <ellipse cx="200" cy="320" rx="140" ry="40" fill="url(#island2-base)" filter="url(#shadow2)"/>
  <ellipse cx="200" cy="310" rx="120" ry="30" fill="#D2B48C"/>

  <!-- Large bamboo stalks -->
  <g stroke="#228B22" stroke-width="8" fill="none">
    <path d="M100 310 L100 200 L100 150"/>
    <path d="M130 310 L130 210 L130 160"/>
    <path d="M300 310 L300 195 L300 140"/>
    <path d="M330 310 L330 210 L330 165"/>
  </g>
  <!-- Bamboo segments -->
  <g fill="#654321">
    <rect x="96" y="230" width="8" height="4"/>
    <rect x="96" y="270" width="8" height="4"/>
    <rect x="126" y="240" width="8" height="4"/>
    <rect x="296" y="235" width="8" height="4"/>
    <rect x="296" y="275" width="8" height="4"/>
    <rect x="326" y="245" width="8" height="4"/>
  </g>

  <!-- Open scroll/book on stand -->
  <g filter="url(#shadow2)">
    <!-- Book stand -->
    <rect x="180" y="270" width="40" height="35" fill="#654321"/>
    <rect x="175" y="265" width="50" height="8" fill="#8B4513"/>

    <!-- Left scroll page -->
    <path d="M100 180 Q100 170 110 170 L180 170 L180 280 L110 280 Q100 280 100 270 Z" fill="url(#bamboo-scroll)" stroke="#8B4513" stroke-width="2"/>
    <!-- Right scroll page -->
    <path d="M300 180 Q300 170 290 170 L220 170 L220 280 L290 280 Q300 280 300 270 Z" fill="url(#bamboo-scroll)" stroke="#8B4513" stroke-width="2"/>

    <!-- Text lines on pages -->
    <g stroke="#8B4513" stroke-width="1" opacity="0.4">
      <line x1="120" y1="190" x2="170" y2="190"/>
      <line x1="120" y1="205" x2="170" y2="205"/>
      <line x1="120" y1="220" x2="165" y2="220"/>
      <line x1="120" y1="235" x2="170" y2="235"/>
      <line x1="120" y1="250" x2="160" y2="250"/>
      <line x1="120" y1="265" x2="170" y2="265"/>
      <line x1="230" y1="190" x2="280" y2="190"/>
      <line x1="230" y1="205" x2="280" y2="205"/>
      <line x1="235" y1="220" x2="280" y2="220"/>
      <line x1="230" y1="235" x2="280" y2="235"/>
      <line x1="240" y1="250" x2="280" y2="250"/>
      <line x1="230" y1="265" x2="280" y2="265"/>
    </g>

    <!-- Central binding -->
    <rect x="195" y="170" width="10" height="115" fill="#8B4513"/>
  </g>

  <!-- Floating Chinese characters -->
  <g fill="#8B4513" font-family="serif" font-size="28" opacity="0.6">
    <text x="50" y="120">書</text>
    <text x="320" y="140">卷</text>
    <text x="280" y="100">典</text>
    <text x="60" y="160">文</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="200" cy="140" r="4" fill="#DAA520"/>
  <circle cx="160" cy="160" r="3" fill="#DAA520"/>
  <circle cx="240" cy="155" r="3" fill="#DAA520"/>
</svg>