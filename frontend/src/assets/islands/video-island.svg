<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="sgV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a890d8"/>
      <stop offset="100%" stop-color="#6848a8"/>
    </linearGradient>
    <linearGradient id="ggV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9060c8"/>
      <stop offset="100%" stop-color="#7038a0"/>
    </linearGradient>
    <linearGradient id="rgV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a7080"/>
      <stop offset="100%" stop-color="#303848"/>
    </linearGradient>
    <linearGradient id="scV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1060"/>
      <stop offset="100%" stop-color="#050830"/>
    </linearGradient>
    <filter id="shV" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <radialGradient id="clV" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="280" fill="none"/>

  <g fill="#fff" opacity="0.4">
    <circle cx="45" cy="30" r="1.2"/>
    <circle cx="115" cy="18" r="0.8"/>
    <circle cx="195" cy="25" r="1"/>
    <circle cx="280" cy="15" r="0.8"/>
    <circle cx="355" cy="35" r="1.2"/>
  </g>

  <ellipse cx="200" cy="248" rx="120" ry="13" fill="rgba(0,0,0,0.25)">
    <animate attributeName="ry" values="13;10;13" dur="4.5s" repeatCount="indefinite"/>
  </ellipse>

  <g filter="url(#shV)">
    <path d="M62,240 L88,155 L312,155 L338,240 L325,255 L75,255 Z" fill="url(#rgV)"/>
    <path d="M88,155 L75,170 L72,255 L102,255 L105,162 Z" fill="#404858" opacity="0.3"/>
    <path d="M312,155 L325,170 L325,255 L298,255 L295,162 Z" fill="#404858" opacity="0.3"/>
  </g>

  <path d="M68,155 Q78,145 200,138 Q322,145 332,155 L332,148 Q322,135 200,128 Q78,135 68,148 Z" fill="url(#ggV)"/>

  <!-- 影院 -->
  <g transform="translate(118,60)">
    <rect x="0" y="48" width="155" height="52" fill="#5858a0"/>
    <rect x="5" y="53" width="145" height="42" fill="#6868b0"/>
    <rect x="5" y="58" width="145" height="2" fill="#7878c0"/>
    <rect x="12" y="60" width="120" height="35" fill="url(#scV)" rx="2"/>
    <rect x="12" y="60" width="120" height="35" fill="#3838c0" opacity="0.4" rx="2">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
    <polygon points="68,70 68,84 85,77" fill="#e8e8ff"/>
    <rect x="6" y="95" width="10" height="16" fill="#5858a0"/>
    <rect x="139" y="95" width="10" height="16" fill="#5858a0"/>
    <path d="M-6,48 L78,10 L162,48 Z" fill="#5050a0"/>
    <path d="M-10,48 Q0,35 78,8 Q156,35 166,48" stroke="#7070c0" stroke-width="3" fill="none"/>
    <g>
      <circle cx="22" cy="38" r="3" fill="#c0a0ff">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="78" cy="28" r="4" fill="#c0a0ff">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="128" cy="38" r="3" fill="#c0a0ff">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- 胶片卷 -->
  <g transform="translate(38,108)">
    <circle cx="26" cy="26" r="22" fill="#505868" stroke="#606878" stroke-width="2"/>
    <circle cx="26" cy="26" r="10" fill="#283038"/>
    <circle cx="26" cy="26" r="6" fill="#404858"/>
    <circle cx="26" cy="1" r="2.5" fill="#606878"/>
    <circle cx="26" cy="51" r="2.5" fill="#606878"/>
    <circle cx="1" cy="26" r="2.5" fill="#606878"/>
    <circle cx="51" cy="26" r="2.5" fill="#606878"/>
  </g>

  <g transform="translate(318,125)">
    <circle cx="20" cy="20" r="18" fill="#505868" stroke="#606878" stroke-width="2"/>
    <circle cx="20" cy="20" r="8" fill="#283038"/>
    <circle cx="20" cy="20" r="5" fill="#404858"/>
    <circle cx="20" cy="0" r="2" fill="#606878"/>
    <circle cx="20" cy="40" r="2" fill="#606878"/>
    <circle cx="0" cy="20" r="2" fill="#606878"/>
    <circle cx="40" cy="20" r="2" fill="#606878"/>
  </g>

  <g opacity="0.85">
    <text x="45" y="65" font-size="18">🎥</text>
    <text x="335" y="85" font-size="16">🎬</text>
  </g>

  <ellipse cx="75" cy="258" rx="58" ry="17" fill="url(#clV)">
    <animate attributeName="cx" values="75;65;75" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="265" rx="72" ry="20" fill="url(#clV)">
    <animate attributeName="cx" values="200;190;200" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="308" cy="255" rx="48" ry="14" fill="url(#clV)">
    <animate attributeName="cx" values="308;318;308" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <circle cx="140" cy="110" r="1.5" fill="#e8d8ff" opacity="0.4">
    <animate attributeName="cy" values="110;105;110" dur="3s" repeatCount="indefinite"/>
  </circle>
