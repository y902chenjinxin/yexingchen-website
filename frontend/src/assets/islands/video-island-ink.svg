<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="rockGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4548"/>
      <stop offset="100%" stop-color="#1a2528"/>
    </linearGradient>
    <linearGradient id="grassGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a50"/>
      <stop offset="100%" stop-color="#3a3a42"/>
    </linearGradient>
    <linearGradient id="stoneGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a48"/>
      <stop offset="100%" stop-color="#2a2a28"/>
    </linearGradient>
    <linearGradient id="roofGradV" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4a4858"/>
      <stop offset="100%" stop-color="#5a5868"/>
    </linearGradient>

    <filter id="inkBlurV" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="cloudFilterV" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="shadowBlurV" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <filter id="glowSoftV" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="mistGradV1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(180, 200, 205, 0.35)"/>
      <stop offset="60%" stop-color="rgba(150, 175, 180, 0.2)"/>
      <stop offset="100%" stop-color="rgba(100, 130, 140, 0)"/>
    </radialGradient>
    <radialGradient id="mistGradV2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(160, 185, 190, 0.3)"/>
      <stop offset="100%" stop-color="rgba(120, 150, 160, 0)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="280" fill="none"/>

  <!-- 远山 -->
  <path d="M-10,178 Q50,150 100,168 Q150,142 200,158 Q250,135 300,152 Q350,138 410,155 L410,280 L-10,280 Z"
        fill="rgba(38, 50, 55, 0.38)" filter="url(#inkBlurV)"/>

  <!-- 岩石底座 -->
  <g filter="url(#shadowBlurV)">
    <path d="M55,245 L88,158 L312,158 L345,245 L330,260 L70,260 Z" fill="url(#rockGradV)" opacity="0.9"/>
    <path d="M88,158 L74,178 L70,260 L100,260 L102,165 Z" fill="rgba(15, 22, 25, 0.5)"/>
    <path d="M312,158 L326,178 L330,260 L300,260 L298,165 Z" fill="rgba(15, 22, 25, 0.5)"/>
    <path d="M130,178 L138,205 M200,175 L205,208 M270,180 L278,210"
          stroke="rgba(20, 30, 35, 0.5)" stroke-width="1.2" fill="none"/>
  </g>

  <!-- 草地 -->
  <path d="M70,158 Q85,148 200,140 Q315,148 330,158 L330,152 Q315,140 200,132 Q85,140 70,152 Z"
        fill="url(#grassGradV)" opacity="0.85"/>

  <!-- 放映亭 - 简洁飞檐 -->
  <g transform="translate(155,78)">
    <rect x="18" y="38" width="6" height="36" fill="#4a4848" opacity="0.9"/>
    <rect x="62" y="38" width="6" height="36" fill="#4a4848" opacity="0.9"/>
    <rect x="15" y="34" width="56" height="5" fill="#3a3838" opacity="0.9"/>
    <!-- 飞檐 -->
    <path d="M-5,34 Q15,24 42,14 Q70,24 85,34 Q70,29 42,22 Q15,29 -5,34 Z"
          fill="url(#roofGradV)" opacity="0.95"/>
    <path d="M-8,34 Q12,26 42,16 Q72,26 88,34" stroke="#6a6878" stroke-width="1" fill="none"/>
    <!-- 幕布框 -->
    <rect x="22" y="42" width="42" height="28" fill="rgba(30, 30, 35, 0.9)" rx="1"/>
    <rect x="24" y="44" width="38" height="24" fill="rgba(45, 45, 52, 0.85)" rx="1"/>
    <!-- 幕布微光 -->
    <rect x="26" y="46" width="34" height="20" fill="rgba(80, 85, 95, 0.3)" rx="1">
      <animate attributeName="opacity" values="0.25;0.4;0.25" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 山石 -->
  <g transform="translate(45,115)" opacity="0.85">
    <path d="M5,50 L15,25 L30,35 L40,15 L55,30 L65,50 Z" fill="url(#stoneGradV)" opacity="0.85"/>
    <path d="M15,25 L12,35 M30,35 L28,48 M40,15 L42,28"
          stroke="rgba(25, 30, 32, 0.5)" stroke-width="1" fill="none"/>
  </g>

  <g transform="translate(305,118)" opacity="0.8">
    <path d="M0,48 L12,22 L28,30 L38,12 L52,28 L60,48 Z" fill="url(#stoneGradV)" opacity="0.8"/>
  </g>

  <!-- 胶片符号 -->
  <g opacity="0.4" filter="url(#glowSoftV)">
    <text x="338" y="85" font-size="12" fill="#a8a8b0">◉</text>
    <text x="45" y="80" font-size="10" fill="#a8a8b0">▶</text>
  </g>

  <!-- 云雾托起 -->
  <ellipse cx="78" cy="262" rx="68" ry="20" fill="url(#mistGradV1)" filter="url(#cloudFilterV)">
    <animate attributeName="cx" values="78;68;78" dur="8.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="268" rx="85" ry="24" fill="url(#mistGradV2)" filter="url(#cloudFilterV)">
    <animate attributeName="cx" values="200;190;200" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="322" cy="258" rx="58" ry="17" fill="url(#mistGradV1)" filter="url(#cloudFilterV)">
    <animate attributeName="cx" values="322;332;322" dur="7.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 悬浮阴影 -->
  <ellipse cx="200" cy="258" rx="128" ry="10" fill="rgba(10, 18, 22, 0.4)" filter="url(#inkBlurV)">
    <animate attributeName="ry" values="10;6;10" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 灵气光点 -->
  <circle cx="145" cy="112" r="1.2" fill="rgba(180, 190, 200, 0.4)" filter="url(#glowSoftV)">
    <animate attributeName="cy" values="112;105;112" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="255" cy="108" r="1" fill="rgba(180, 190, 200, 0.35)" filter="url(#glowSoftV)">
    <animate attributeName="cy" values="108;102;108" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>