<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="sky5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>
    <linearGradient id="island5-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#696969"/>
      <stop offset="100%" style="stop-color:#3a3a3a"/>
    </linearGradient>
    <linearGradient id="gear-metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0C0C0"/>
      <stop offset="50%" style="stop-color:#A0A0A0"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <linearGradient id="gear-brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#8B7500"/>
    </linearGradient>
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="metal-shine">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1" specularExponent="20" lighting-color="#white" result="specOut">
        <fePointLight x="-5000" y="-5000" z="20000"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>

  <!-- Dark industrial sky -->
  <rect width="400" height="400" fill="url(#sky5)"/>

  <!-- Subtle circuit pattern -->
  <g stroke="#3a3a3a" stroke-width="1" fill="none" opacity="0.5">
    <path d="M0 100 L100 100 L100 150 L200 150"/>
    <path d="M400 200 L300 200 L300 250 L200 250"/>
    <path d="M50 300 L50 350 L150 350"/>
    <path d="M350 100 L350 50 L250 50"/>
  </g>
  <g fill="#3a3a3a">
    <circle cx="100" cy="100" r="4"/>
    <circle cx="300" cy="200" r="4"/>
    <circle cx="50" cy="300" r="4"/>
    <circle cx="350" cy="50" r="4"/>
  </g>

  <!-- Island base -->
  <ellipse cx="200" cy="320" rx="140" ry="40" fill="url(#island5-base)" filter="url(#shadow5)"/>
  <ellipse cx="200" cy="310" rx="120" ry="30" fill="#505050"/>

  <!-- Main gear (brass) -->
  <g transform="translate(200, 230)" filter="url(#shadow5)">
    <circle cx="0" cy="0" r="55" fill="url(#gear-brass)"/>
    <!-- Gear teeth -->
    <g fill="#B8860B">
      <rect x="-8" y="-65" width="16" height="15" rx="2"/>
      <rect x="-8" y="50" width="16" height="15" rx="2"/>
      <rect x="50" y="-8" width="15" height="16" rx="2"/>
      <rect x="-65" y="-8" width="15" height="16" rx="2"/>
      <rect x="32" y="-48" width="14" height="14" rx="2" transform="rotate(45 39 -41)"/>
      <rect x="-46" y="-48" width="14" height="14" rx="2" transform="rotate(-45 -39 -41)"/>
      <rect x="32" y="34" width="14" height="14" rx="2" transform="rotate(-45 39 41)"/>
      <rect x="-46" y="34" width="14" height="14" rx="2" transform="rotate(45 -39 41)"/>
    </g>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="40" fill="#8B7500"/>
    <!-- Center hole -->
    <circle cx="0" cy="0" r="15" fill="#2a2a2a"/>
    <circle cx="0" cy="0" r="10" fill="#1a1a1a"/>
  </g>

  <!-- Secondary gear (smaller, silver) -->
  <g transform="translate(290, 280)" filter="url(#shadow5)">
    <circle cx="0" cy="0" r="30" fill="url(#gear-metal)"/>
    <!-- Gear teeth -->
    <g fill="#909090">
      <rect x="-5" y="-38" width="10" height="10" rx="1"/>
      <rect x="-5" y="28" width="10" height="10" rx="1"/>
      <rect x="28" y="-5" width="10" height="10" rx="1"/>
      <rect x="-38" y="-5" width="10" height="10" rx="1"/>
      <rect x="18" y="-28" width="8" height="8" rx="1" transform="rotate(45 22 -24)"/>
      <rect x="-26" y="-28" width="8" height="8" rx="1" transform="rotate(-45 -22 -24)"/>
      <rect x="18" y="20" width="8" height="8" rx="1" transform="rotate(-45 22 24)"/>
      <rect x="-26" y="20" width="8" height="8" rx="1" transform="rotate(45 -22 24)"/>
    </g>
    <circle cx="0" cy="0" r="20" fill="#808080"/>
    <circle cx="0" cy="0" r="8" fill="#2a2a2a"/>
  </g>

  <!-- Third small gear -->
  <g transform="translate(120, 270)" filter="url(#shadow5)">
    <circle cx="0" cy="0" r="25" fill="url(#gear-metal)"/>
    <g fill="#909090">
      <rect x="-4" y="-32" width="8" height="8" rx="1"/>
      <rect x="-4" y="24" width="8" height="8" rx="1"/>
      <rect x="24" y="-4" width="8" height="8" rx="1"/>
      <rect x="-32" y="-4" width="8" height="8" rx="1"/>
    </g>
    <circle cx="0" cy="0" r="15" fill="#808080"/>
    <circle cx="0" cy="0" r="6" fill="#2a2a2a"/>
  </g>

  <!-- Connecting rod -->
  <g stroke="#A0A0A0" stroke-width="6" fill="none">
    <line x1="170" y1="230" x2="120" y2="270"/>
  </g>

  <!-- Wrench tool -->
  <g transform="translate(310, 150) rotate(-30)" filter="url(#shadow5)">
    <rect x="0" y="0" width="8" height="45" fill="#A0A0A0"/>
    <path d="M-8 45 L0 60 L8 45 Z" fill="#808080"/>
    <rect x="-12" y="-5" width="24" height="12" rx="2" fill="#707070"/>
    <rect x="-8" y="-2" width="16" height="6" fill="#2a2a2a"/>
  </g>

  <!-- Screwdriver -->
  <g transform="translate(80, 160) rotate(20)" filter="url(#shadow5)">
    <rect x="0" y="0" width="6" height="40" fill="#CD5C5C"/>
    <rect x="0" y="40" width="6" height="20" fill="#A0A0A0"/>
    <path d="M0 60 L3 70 L6 60 Z" fill="#808080"/>
  </g>

  <!-- Small bolts -->
  <g fill="#505050">
    <circle cx="160" cy="280" r="5"/>
    <circle cx="240" cy="260" r="4"/>
    <circle cx="180" cy="300" r="3"/>
  </g>
</svg>