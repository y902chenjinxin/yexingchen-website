<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="sgT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd0a8"/>
      <stop offset="100%" stop-color="#ffa060"/>
    </linearGradient>
    <linearGradient id="ggT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d08040"/>
      <stop offset="100%" stop-color="#b06020"/>
    </linearGradient>
    <linearGradient id="mtT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8090a0"/>
      <stop offset="100%" stop-color="#404858"/>
    </linearGradient>
    <linearGradient id="cpT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e07850"/>
      <stop offset="100%" stop-color="#a05830"/>
    </linearGradient>
    <filter id="shT" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <radialGradient id="clT" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="280" fill="none"/>

  <ellipse cx="42" cy="38" rx="45" ry="17" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="358" cy="48" rx="40" ry="14" fill="rgba(255,255,255,0.3)"/>

  <ellipse cx="200" cy="250" rx="125" ry="14" fill="rgba(0,0,0,0.25)">
    <animate attributeName="ry" values="14;11;14" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <g filter="url(#shT)">
    <path d="M55,242 L88,152 L312,152 L345,242 L332,257 L68,257 Z" fill="url(#mtT)"/>
    <path d="M88,152 L75,168 L72,257 L102,257 L105,160 Z" fill="#485868" opacity="0.3"/>
    <path d="M312,152 L325,168 L332,257 L298,257 L295,160 Z" fill="#485868" opacity="0.3"/>
  </g>

  <path d="M65,152 Q75,142 200,135 Q325,142 335,152 L335,145 Q325,132 200,125 Q75,132 65,145 Z" fill="url(#ggT)"/>

  <!-- 工坊 -->
  <g transform="translate(125,62)">
    <rect x="0" y="48" width="145" height="52" fill="#6878a0"/>
    <rect x="5" y="53" width="135" height="42" fill="#7888b0"/>
    <rect x="5" y="58" width="135" height="2" fill="#8898c0"/>
    <rect x="12" y="62" width="28" height="22" fill="#1a2030" rx="2"/>
    <rect x="12" y="62" width="28" height="22" fill="#4080c0" opacity="0.5" rx="2">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="55" y="62" width="28" height="22" fill="#1a2030" rx="2"/>
    <rect x="55" y="62" width="28" height="22" fill="#4080c0" opacity="0.5" rx="2">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="98" y="62" width="28" height="22" fill="#1a2030" rx="2"/>
    <rect x="98" y="62" width="28" height="22" fill="#4080c0" opacity="0.5" rx="2">
      <animate attributeName="opacity" values="0.35;0.65;0.35" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="12" y="62" width="28" height="22" fill="none" stroke="#5868a0" stroke-width="1.5" rx="2"/>
    <rect x="55" y="62" width="28" height="22" fill="none" stroke="#5868a0" stroke-width="1.5" rx="2"/>
    <rect x="98" y="62" width="28" height="22" fill="none" stroke="#5868a0" stroke-width="1.5" rx="2"/>

    <!-- 屋顶齿轮 -->
    <g transform="translate(72,40)">
      <circle cx="0" cy="0" r="30" fill="#5868a0" stroke="#7888b0" stroke-width="2"/>
      <circle cx="0" cy="0" r="12" fill="#4858a0"/>
      <circle cx="0" cy="0" r="6" fill="#3848a0"/>
      <g fill="#5868a0">
        <rect x="-4" y="-32" width="8" height="7" rx="1"/>
        <rect x="-4" y="25" width="8" height="7" rx="1"/>
        <rect x="-32" y="-4" width="7" height="8" rx="1"/>
        <rect x="25" y="-4" width="7" height="8" rx="1"/>
        <rect x="20" y="-20" width="7" height="7" rx="1" transform="rotate(45,23,-16)"/>
        <rect x="-27" y="-20" width="7" height="7" rx="1" transform="rotate(-45,-23,-16)"/>
        <rect x="20" y="20" width="7" height="7" rx="1" transform="rotate(-45,23,23)"/>
        <rect x="-27" y="20" width="7" height="7" rx="1" transform="rotate(45,-23,23)"/>
      </g>
      <circle cx="0" cy="0" r="3" fill="#8898c0"/>
      <animateTransform attributeName="transform" type="rotate" from="0,0,0" to="360,0,0" dur="12s" repeatCount="indefinite"/>
    </g>

    <!-- 烟囱 -->
    <rect x="105" y="14" width="18" height="32" fill="#5868a0"/>
    <rect x="103" y="11" width="22" height="5" fill="#4858a0"/>
    <circle cx="113" cy="8" r="5" fill="#e8e0d8" opacity="0.7">
      <animate attributeName="cy" values="8;-12;8" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="118" cy="-2" r="4" fill="#e8e0d8" opacity="0.5">
      <animate attributeName="cy" values="-2;-18;-2" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 铜齿轮 -->
  <g transform="translate(42,155)">
    <circle cx="18" cy="18" r="16" fill="url(#cpT)" stroke="#e89870" stroke-width="2"/>
    <circle cx="18" cy="18" r="6" fill="#a05830"/>
    <circle cx="18" cy="18" r="3" fill="#805828"/>
    <rect x="16" y="0" width="4" height="6" fill="#c07850"/>
    <rect x="16" y="30" width="4" height="6" fill="#c07850"/>
    <rect x="0" y="16" width="6" height="4" fill="#c07850"/>
    <rect x="30" y="16" width="6" height="4" fill="#c07850"/>
    <animateTransform attributeName="transform" type="rotate" from="0,18,18" to="-360,18,18" dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- 图标 -->
  <g opacity="0.85">
    <text x="40" y="112" font-size="20">🔧</text>
    <text x="325" y="108" font-size="18">⚙️</text>
  </g>

  <!-- 管道 -->
  <g stroke="#6878a0" stroke-width="4" fill="none" opacity="0.7">
    <path d="M270,165 Q292,145 305,158"/>
    <path d="M280,158 Q288,140 300,148"/>
  </g>

  <ellipse cx="72" cy="258" rx="62" ry="18" fill="url(#clT)">
    <animate attributeName="cx" values="72;62;72" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="265" rx="78" ry="22" fill="url(#clT)">
    <animate attributeName="cx" values="200;190;200" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="312" cy="255" rx="52" ry="15" fill="url(#clT)">
    <animate attributeName="cx" values="312;322;312" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <circle cx="125" cy="118" r="1.5" fill="#ffe8d8" opacity="0.4">
    <animate attributeName="cy" values="118;113;118" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>