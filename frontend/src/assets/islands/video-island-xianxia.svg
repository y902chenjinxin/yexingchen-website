<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="60%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#21262d"/>
    </linearGradient>
    <linearGradient id="stone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#484f58"/>
      <stop offset="100%" style="stop-color:#30363d"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#c9d1d9;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c9d1d9;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="mist" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#fff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
    <filter id="island-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="450" fill="url(#bg)"/>

  <!-- 月 -->
  <circle cx="320" cy="80" r="35" fill="url(#moon-glow)"/>
  <circle cx="320" cy="80" r="30" fill="#f0f0f0" opacity="0.95"/>

  <!-- 远山 -->
  <path d="M0 320 Q60 260 120 290 Q180 250 240 280 Q300 240 360 270 Q390 255 400 260 L400 450 L0 450 Z" fill="#0d1117"/>
  <path d="M0 340 Q80 300 160 330 Q220 295 300 320 Q360 290 400 310 L400 450 L0 450 Z" fill="#161b22"/>

  <!-- 岛屿主体 -->
  <g filter="url(#island-shadow)">
    <path d="M100 300 Q80 280 90 250 Q110 220 140 210 L260 210 Q290 220 310 250 Q320 280 300 300 Q250 320 200 325 Q150 320 100 300 Z" fill="url(#stone)"/>
    <path d="M130 220 Q120 210 130 195 Q160 175 200 172 Q240 175 270 195 Q280 210 270 220 Z" fill="#484f58"/>
    <g stroke="#30363d" stroke-width="1" fill="none" opacity="0.5">
      <path d="M120 260 Q140 250 150 270"/>
      <path d="M250 250 Q270 260 280 245"/>
    </g>
  </g>

  <!-- 影视装置 - 极简 -->
  <g fill="none" stroke="#8b949e" stroke-width="1.5">
    <!-- 镜头/放映机 -->
    <circle cx="200" cy="185" r="15"/>
    <circle cx="200" cy="185" r="8"/>
    <!-- 胶片卷 -->
    <circle cx="165" cy="195" r="10"/>
    <circle cx="165" cy="195" r="5"/>
    <circle cx="235" cy="195" r="10"/>
    <circle cx="235" cy="195" r="5"/>
    <!-- 支架 -->
    <line x1="185" y1="200" x2="180" y2="210"/>
    <line x1="215" y1="200" x2="220" y2="210"/>
  </g>

  <!-- 影像光芒 -->
  <g filter="url(#soft-glow)">
    <path d="M150 180 L120 160 L100 180 L80 165" stroke="#a371f7" stroke-width="0.8" fill="none" opacity="0.6"/>
    <path d="M250 180 L280 160 L300 180 L320 165" stroke="#a371f7" stroke-width="0.8" fill="none" opacity="0.6"/>
  </g>

  <!-- 灵气光点 -->
  <g fill="#a371f7">
    <circle cx="130" cy="230" r="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="270" cy="215" r="0.8" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <!-- 云雾 -->
  <ellipse cx="200" cy="340" rx="120" ry="25" fill="url(#mist)"/>
  <ellipse cx="140" cy="355" rx="60" ry="15" fill="url(#mist)" opacity="0.6"/>
  <ellipse cx="270" cy="350" rx="50" ry="12" fill="url(#mist)" opacity="0.5"/>
</svg>