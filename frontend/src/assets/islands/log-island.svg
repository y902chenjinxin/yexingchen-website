<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="sky4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2F4F4F"/>
      <stop offset="100%" style="stop-color:#1a3a3a"/>
    </linearGradient>
    <linearGradient id="island4-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="100%" style="stop-color:#5D4E37"/>
    </linearGradient>
    <linearGradient id="bamboo-stick" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DEB887"/>
      <stop offset="50%" style="stop-color:#F5DEB3"/>
      <stop offset="100%" style="stop-color:#DEB887"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Muted jade sky -->
  <rect width="400" height="400" fill="url(#sky4)"/>

  <!-- Soft mist -->
  <ellipse cx="200" cy="350" rx="200" ry="80" fill="rgba(255,250,240,0.15)"/>

  <!-- Island base -->
  <ellipse cx="200" cy="320" rx="140" ry="40" fill="url(#island4-base)" filter="url(#shadow4)"/>
  <ellipse cx="200" cy="310" rx="120" ry="30" fill="#A0876C"/>

  <!-- Bamboo divination sticks in holder -->
  <g filter="url(#shadow4)">
    <!-- Wooden stand -->
    <rect x="160" y="280" width="80" height="30" rx="3" fill="#654321"/>
    <rect x="150" y="275" width="100" height="10" rx="2" fill="#8B4513"/>

    <!-- Bundle of sticks -->
    <g transform="translate(200, 260)">
      <rect x="-35" y="-80" width="4" height="85" rx="2" fill="url(#bamboo-stick)" transform="rotate(-8)"/>
      <rect x="-25" y="-85" width="4" height="90" rx="2" fill="url(#bamboo-stick)" transform="rotate(-4)"/>
      <rect x="-15" y="-80" width="4" height="85" rx="2" fill="url(#bamboo-stick)"/>
      <rect x="-5" y="-82" width="4" height="87" rx="2" fill="url(#bamboo-stick)" transform="rotate(3)"/>
      <rect x="5" y="-78" width="4" height="83" rx="2" fill="url(#bamboo-stick)" transform="rotate(6)"/>
      <rect x="15" y="-83" width="4" height="88" rx="2" fill="url(#bamboo-stick)" transform="rotate(10)"/>
      <rect x="25" y="-80" width="4" height="85" rx="2" fill="url(#bamboo-stick)" transform="rotate(14)"/>
    </g>
  </g>

  <!-- Hanging wooden plaques with records -->
  <g filter="url(#shadow4)">
    <!-- Left plaque -->
    <g transform="translate(80, 180) rotate(-10)">
      <rect x="-25" y="-15" width="50" height="30" rx="2" fill="#8B4513"/>
      <rect x="-22" y="-12" width="44" height="24" rx="1" fill="#DEB887"/>
      <line x1="-18" y1="-5" x2="18" y2="-5" stroke="#654321" stroke-width="1.5"/>
      <line x1="-18" y1="2" x2="18" y2="2" stroke="#654321" stroke-width="1.5"/>
      <line x1="-18" y1="9" x2="10" y2="9" stroke="#654321" stroke-width="1.5"/>
      <!-- String -->
      <line x1="0" y1="-15" x2="0" y2="-35" stroke="#654321" stroke-width="1.5"/>
    </g>

    <!-- Center plaque (larger) -->
    <g transform="translate(200, 160)">
      <rect x="-30" y="-18" width="60" height="36" rx="2" fill="#8B4513"/>
      <rect x="-26" y="-14" width="52" height="28" rx="1" fill="#F5DEB3"/>
      <line x1="-20" y1="-6" x2="20" y2="-6" stroke="#654321" stroke-width="2"/>
      <line x1="-20" y1="2" x2="20" y2="2" stroke="#654321" stroke-width="2"/>
      <line x1="-20" y1="10" x2="12" y2="10" stroke="#654321" stroke-width="2"/>
      <!-- String -->
      <line x1="0" y1="-18" x2="0" y2="-40" stroke="#654321" stroke-width="2"/>
      <!-- Red seal -->
      <rect x="10" y="-4" width="12" height="12" fill="#CD5C5C" opacity="0.8"/>
    </g>

    <!-- Right plaque -->
    <g transform="translate(320, 185) rotate(8)">
      <rect x="-25" y="-15" width="50" height="30" rx="2" fill="#8B4513"/>
      <rect x="-22" y="-12" width="44" height="24" rx="1" fill="#DEB887"/>
      <line x1="-18" y1="-5" x2="18" y2="-5" stroke="#654321" stroke-width="1.5"/>
      <line x1="-18" y1="2" x2="18" y2="2" stroke="#654321" stroke-width="1.5"/>
      <line x1="-18" y1="9" x2="10" y2="9" stroke="#654321" stroke-width="1.5"/>
      <!-- String -->
      <line x1="0" y1="-15" x2="0" y2="-30" stroke="#654321" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Ink brush -->
  <g transform="translate(310, 130) rotate(45)" filter="url(#shadow4)">
    <rect x="0" y="0" width="6" height="50" fill="#1a1a1a"/>
    <rect x="0" y="50" width="6" height="15" fill="#8B4513"/>
  </g>

  <!-- Small decorative elements -->
  <g fill="#CD5C5C" opacity="0.6">
    <circle cx="130" cy="230" r="3"/>
    <circle cx="270" cy="240" r="3"/>
  </g>
</svg>