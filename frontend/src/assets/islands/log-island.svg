<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="sgL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0e0d8"/>
      <stop offset="100%" stop-color="#a0c0b0"/>
    </linearGradient>
    <linearGradient id="ggL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ab060"/>
      <stop offset="100%" stop-color="#4a9040"/>
    </linearGradient>
    <linearGradient id="stL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8090a0"/>
      <stop offset="100%" stop-color="#404858"/>
    </linearGradient>
    <linearGradient id="lgL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9a8a6a"/>
      <stop offset="100%" stop-color="#6a5a3a"/>
    </linearGradient>
    <filter id="shL" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <radialGradient id="clL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="280" fill="none"/>

  <ellipse cx="45" cy="40" rx="42" ry="15" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="355" cy="50" rx="38" ry="13" fill="rgba(255,255,255,0.3)"/>

  <ellipse cx="200" cy="248" rx="115" ry="13" fill="rgba(0,0,0,0.25)">
    <animate attributeName="ry" values="13;10;13" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>

  <g filter="url(#shL)">
    <path d="M65,238 L92,152 L308,152 L335,238 L320,253 L80,253 Z" fill="url(#stL)"/>
    <path d="M92,152 L80,168 L78,253 L106,253 L108,160 Z" fill="#485868" opacity="0.3"/>
    <path d="M308,152 L320,168 L320,253 L294,253 L292,160 Z" fill="#485868" opacity="0.3"/>
  </g>

  <path d="M75,152 Q85,142 200,135 Q315,142 325,152 L325,145 Q315,132 200,125 Q85,132 75,145 Z" fill="url(#ggL)"/>

  <!-- 日志阁 -->
  <g transform="translate(148,68)">
    <rect x="8" y="55" width="95" height="6" fill="#5a4a3a" rx="1"/>
    <rect x="10" y="30" width="12" height="55" fill="url(#lgL)"/>
    <rect x="88" y="30" width="12" height="55" fill="url(#lgL)"/>
    <rect x="5" y="25" width="90" height="5" fill="#7a6a5a"/>
    <rect x="10" y="35" width="80" height="26" fill="#8a7a5a"/>
    <line x1="10" y1="42" x2="90" y2="42" stroke="#6a5a3a" stroke-width="1.5"/>
    <line x1="10" y1="50" x2="90" y2="50" stroke="#6a5a3a" stroke-width="1.5"/>
    <ellipse cx="48" cy="46" rx="4" ry="2" fill="#5a4a3a" opacity="0.4"/>
    <rect x="35" y="42" width="18" height="14" fill="#203040" rx="1"/>
    <line x1="44" y1="42" x2="44" y2="56" stroke="#5a4a3a" stroke-width="1"/>
    <path d="M-6,25 L48,-8 L102,25 Z" fill="#7a6a4a"/>
    <path d="M-10,25 Q0,14 48,-12 Q96,14 106,25" stroke="#8a7a5a" stroke-width="4" fill="none"/>
    <rect x="38" y="6" width="26" height="12" fill="#5a4030" rx="1"/>
    <text x="51" y="16" text-anchor="middle" font-size="8" fill="#d4c4a4" font-family="serif">日志</text>
  </g>

  <!-- 毛笔 -->
  <g transform="translate(52,85)">
    <line x1="26" y1="55" x2="26" y2="8" stroke="#5a4030" stroke-width="5"/>
    <ellipse cx="26" cy="6" rx="5" ry="11" fill="#2a1a0a"/>
  </g>

  <!-- 砚台 -->
  <g transform="translate(318,130)">
    <ellipse cx="22" cy="18" rx="20" ry="12" fill="#404858"/>
    <ellipse cx="22" cy="16" rx="16" ry="9" fill="#505868"/>
    <ellipse cx="20" cy="14" rx="5" ry="3" fill="#1a1a2a"/>
  </g>

  <!-- 竹子 -->
  <g transform="translate(35,125)">
    <rect x="10" y="15" width="6" height="60" fill="#3d8b4d"/>
    <rect x="12" y="17" width="3" height="58" fill="#4a9b5a"/>
    <ellipse cx="6" cy="12" rx="9" ry="3" fill="#4a9b5a" transform="rotate(-28,6,12)"/>
    <ellipse cx="18" cy="8" rx="8" ry="2.5" fill="#5ab563" transform="rotate(22,18,8)"/>
  </g>

  <!-- 纸卷 -->
  <g transform="translate(355,92)" opacity="0.85">
    <rect x="0" y="0" width="24" height="4" fill="#f4e8d8" rx="1"/>
    <rect x="2" y="6" width="24" height="4" fill="#f0e4d4" rx="1"/>
    <rect x="4" y="12" width="24" height="4" fill="#ece4d0" rx="1"/>
  </g>

  <g opacity="0.8">
    <text x="68" y="75" font-size="15">📜</text>
    <text x="345" y="85" font-size="13">✒️</text>
  </g>

  <ellipse cx="78" cy="255" rx="58" ry="16" fill="url(#clL)">
    <animate attributeName="cx" values="78;68;78" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="262" rx="72" ry="20" fill="url(#clL)">
    <animate attributeName="cx" values="200;190;200" dur="11s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="308" cy="250" rx="48" ry="13" fill="url(#clL)">
    <animate attributeName="cx" values="308;318;308" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <circle cx="132" cy="118" r="1.5" fill="#e8f0e8" opacity="0.4">
    <animate attributeName="cy" values="118;113;118" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>