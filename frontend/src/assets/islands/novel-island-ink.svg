<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="rockGradN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4548"/>
      <stop offset="100%" stop-color="#1a2528"/>
    </linearGradient>
    <linearGradient id="grassGradN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a5a48"/>
      <stop offset="100%" stop-color="#3a4a38"/>
    </linearGradient>
    <linearGradient id="woodGradN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4840"/>
      <stop offset="100%" stop-color="#2a2820"/>
    </linearGradient>
    <linearGradient id="roofGradN" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3a5048"/>
      <stop offset="100%" stop-color="#4a6058"/>
    </linearGradient>
    <linearGradient id="treeGradN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a5a3a"/>
      <stop offset="100%" stop-color="#2a4a2a"/>
    </linearGradient>

    <filter id="inkBlurN" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="cloudFilterN" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="shadowBlurN" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <filter id="glowSoftN" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="mistGradN1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(180, 200, 205, 0.35)"/>
      <stop offset="60%" stop-color="rgba(150, 175, 180, 0.2)"/>
      <stop offset="100%" stop-color="rgba(100, 130, 140, 0)"/>
    </radialGradient>
    <radialGradient id="mistGradN2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(160, 185, 190, 0.3)"/>
      <stop offset="100%" stop-color="rgba(120, 150, 160, 0)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="280" fill="none"/>

  <!-- 远山剪影 -->
  <path d="M-10,175 Q40,150 90,168 Q140,145 190,160 Q240,138 290,155 Q340,140 410,158 L410,280 L-10,280 Z"
        fill="rgba(35, 50, 55, 0.35)" filter="url(#inkBlurN)"/>

  <!-- 岩石底座 -->
  <g filter="url(#shadowBlurN)">
    <path d="M60,248 L90,162 L310,162 L340,248 L325,262 L75,262 Z" fill="url(#rockGradN)" opacity="0.9"/>
    <path d="M90,162 L76,182 L75,262 L102,262 L104,170 Z" fill="rgba(15, 22, 25, 0.5)"/>
    <path d="M310,162 L324,182 L325,262 L298,262 L296,170 Z" fill="rgba(15, 22, 25, 0.5)"/>
    <path d="M140,180 L148,205 M230,178 L238,208 M275,182 L282,212"
          stroke="rgba(20, 30, 35, 0.5)" stroke-width="1.2" fill="none"/>
  </g>

  <!-- 草地 -->
  <path d="M75,162 Q88,152 200,144 Q312,152 325,162 L325,156 Q312,144 200,136 Q88,144 75,156 Z"
        fill="url(#grassGradN)" opacity="0.85"/>

  <!-- 书阁 - 双层飞檐 -->
  <g transform="translate(148,72)">
    <rect x="15" y="45" width="8" height="42" fill="#4a4840" opacity="0.9"/>
    <rect x="73" y="45" width="8" height="42" fill="#4a4840" opacity="0.9"/>
    <rect x="12" y="40" width="82" height="6" fill="#3a3830" opacity="0.9"/>
    <!-- 上层飞檐 -->
    <path d="M-8,40 Q8,30 50,18 Q92,30 108,40 Q92,35 50,26 Q8,35 -8,40 Z"
          fill="url(#roofGradN)" opacity="0.95"/>
    <path d="M-12,40 Q6,32 50,20 Q94,32 112,40" stroke="#5a7068" stroke-width="1" fill="none"/>
    <!-- 下层飞檐 -->
    <path d="M-5,52 Q10,44 50,36 Q90,44 105,52 Q90,48 50,42 Q10,48 -5,52 Z"
          fill="url(#roofGradN)" opacity="0.9"/>
    <path d="M-8,52 Q8,46 50,38 Q92,46 108,52" stroke="#5a7068" stroke-width="0.8" fill="none"/>
    <!-- 书架 -->
    <rect x="20" y="48" width="66" height="28" fill="rgba(45, 42, 38, 0.9)" rx="2"/>
    <line x1="32" y1="52" x2="32" y2="74" stroke="rgba(80, 90, 95, 0.4)" stroke-width="0.5"/>
    <line x1="48" y1="52" x2="48" y2="74" stroke="rgba(80, 90, 95, 0.4)" stroke-width="0.5"/>
    <line x1="64" y1="52" x2="64" y2="74" stroke="rgba(80, 90, 95, 0.4)" stroke-width="0.5"/>
    <!-- 书卷隐约可见 -->
    <rect x="24" y="55" width="6" height="18" fill="rgba(180, 170, 150, 0.3)" rx="1"/>
    <rect x="40" y="56" width="6" height="16" fill="rgba(170, 160, 145, 0.25)" rx="1"/>
    <rect x="56" y="54" width="6" height="19" fill="rgba(185, 175, 155, 0.28)" rx="1"/>
  </g>

  <!-- 松树 - 水墨 -->
  <g transform="translate(48,95)" opacity="0.85">
    <path d="M28,72 L28,35" stroke="#3a3530" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="28" cy="28" rx="22" ry="18" fill="url(#treeGradN)" opacity="0.9"/>
    <ellipse cx="20" cy="22" rx="15" ry="12" fill="#2a4a2a" opacity="0.7"/>
    <ellipse cx="36" cy="25" rx="14" ry="10" fill="#3a5a3a" opacity="0.65"/>
    <ellipse cx="28" cy="15" rx="12" ry="8" fill="#2a4a2a" opacity="0.6"/>
  </g>

  <g transform="translate(310,98)" opacity="0.8">
    <path d="M22,68 L22,30" stroke="#3a3530" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="22" cy="25" rx="18" ry="15" fill="url(#treeGradN)" opacity="0.85"/>
    <ellipse cx="16" cy="20" rx="12" ry="10" fill="#2a4a2a" opacity="0.65"/>
    <ellipse cx="28" cy="22" rx="11" ry="8" fill="#3a5a3a" opacity="0.6"/>
  </g>

  <!-- 书卷符号 -->
  <g opacity="0.45" filter="url(#glowSoftN)">
    <text x="335" cy="88" font-size="13" fill="#9aaa9a">典</text>
    <text x="42" cy="82" font-size="10" fill="#9aaa9a">卷</text>
  </g>

  <!-- 云雾托起 -->
  <ellipse cx="75" cy="265" rx="72" ry="22" fill="url(#mistGradN1)" filter="url(#cloudFilterN)">
    <animate attributeName="cx" values="75;65;75" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1"/>
  </ellipse>
  <ellipse cx="200" cy="270" rx="88" ry="26" fill="url(#mistGradN2)" filter="url(#cloudFilterN)">
    <animate attributeName="cx" values="200;188;200" dur="11s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1"/>
  </ellipse>
  <ellipse cx="325" cy="262" rx="62" ry="19" fill="url(#mistGradN1)" filter="url(#cloudFilterN)">
    <animate attributeName="cx" values="325;335;325" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1"/>
  </ellipse>

  <!-- 悬浮阴影 -->
  <ellipse cx="200" cy="260" rx="135" ry="11" fill="rgba(10, 18, 22, 0.4)" filter="url(#inkBlurN)">
    <animate attributeName="ry" values="11;7;11" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.55;0.35" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 灵气光点 -->
  <circle cx="135" cy="118" r="1.3" fill="rgba(170, 200, 180, 0.45)" filter="url(#glowSoftN)">
    <animate attributeName="cy" values="118;110;118" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="265" cy="105" r="1" fill="rgba(170, 200, 180, 0.4)" filter="url(#glowSoftN)">
    <animate attributeName="cy" values="105;98;105" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>