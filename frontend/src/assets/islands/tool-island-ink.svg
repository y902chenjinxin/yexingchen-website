<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="rockGradT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4548"/>
      <stop offset="100%" stop-color="#1a2528"/>
    </linearGradient>
    <linearGradient id="grassGradT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4840"/>
      <stop offset="100%" stop-color="#3a3830"/>
    </linearGradient>
    <linearGradient id="metalGradT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a5a60"/>
      <stop offset="100%" stop-color="#3a3a40"/>
    </linearGradient>
    <linearGradient id="roofGradT" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4a4848"/>
      <stop offset="100%" stop-color="#5a5858"/>
    </linearGradient>
    <linearGradient id="fireGradT" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8a5a40"/>
      <stop offset="50%" stop-color="#c66a3a"/>
      <stop offset="100%" stop-color="#e88a4a"/>
    </linearGradient>

    <filter id="inkBlurT" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="cloudFilterT" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="shadowBlurT" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <filter id="glowSoftT" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="fireGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="mistGradT1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(180, 200, 205, 0.35)"/>
      <stop offset="60%" stop-color="rgba(150, 175, 180, 0.2)"/>
      <stop offset="100%" stop-color="rgba(100, 130, 140, 0)"/>
    </radialGradient>
    <radialGradient id="mistGradT2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(160, 185, 190, 0.3)"/>
      <stop offset="100%" stop-color="rgba(120, 150, 160, 0)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="280" fill="none"/>

  <!-- 远山 -->
  <path d="M-10,175 Q45,148 95,165 Q145,140 195,158 Q245,135 295,152 Q345,138 410,155 L410,280 L-10,280 Z"
        fill="rgba(38, 48, 52, 0.38)" filter="url(#inkBlurT)"/>

  <!-- 岩石底座 -->
  <g filter="url(#shadowBlurT)">
    <path d="M55,245 L88,158 L312,158 L345,245 L330,260 L70,260 Z" fill="url(#rockGradT)" opacity="0.9"/>
    <path d="M88,158 L74,178 L70,260 L100,260 L102,165 Z" fill="rgba(15, 22, 25, 0.5)"/>
    <path d="M312,158 L326,178 L330,260 L300,260 L298,165 Z" fill="rgba(15, 22, 25, 0.5)"/>
    <path d="M130,178 L138,205 M200,175 L205,208 M270,180 L278,210"
          stroke="rgba(20, 30, 32, 0.5)" stroke-width="1.2" fill="none"/>
  </g>

  <!-- 草地 -->
  <path d="M70,158 Q85,148 200,140 Q315,148 330,158 L330,152 Q315,140 200,132 Q85,140 70,152 Z"
        fill="url(#grassGradT)" opacity="0.85"/>

  <!-- 丹炉亭 -->
  <g transform="translate(155,72)">
    <rect x="18" y="48" width="6" height="35" fill="#4a4848" opacity="0.9"/>
    <rect x="62" y="48" width="6" height="35" fill="#4a4848" opacity="0.9"/>
    <rect x="15" y="44" width="56" height="5" fill="#3a3838" opacity="0.9"/>
    <!-- 飞檐 -->
    <path d="M-5,44 Q15,34 42,24 Q70,34 85,44 Q70,38 42,30 Q15,38 -5,44 Z"
          fill="url(#roofGradT)" opacity="0.95"/>
    <path d="M-8,44 Q12,36 42,26 Q72,36 88,44" stroke="#6a6868" stroke-width="1" fill="none"/>
    <!-- 丹炉底座 -->
    <rect x="25" y="52" width="36" height="6" fill="#3a3a40" opacity="0.9" rx="1"/>
    <!-- 丹炉 -->
    <ellipse cx="43" cy="52" rx="18" ry="8" fill="url(#metalGradT)" opacity="0.9"/>
    <ellipse cx="43" cy="48" rx="16" ry="12" fill="url(#metalGradT)" opacity="0.85"/>
    <!-- 炉口 -->
    <ellipse cx="43" cy="45" rx="10" ry="5" fill="rgba(25, 25, 30, 0.9)"/>
    <!-- 火焰 -->
    <g filter="url(#fireGlow)">
      <ellipse cx="43" cy="42" rx="6" ry="10" fill="url(#fireGradT)" opacity="0.7">
        <animate attributeName="ry" values="10;12;10;8;10" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.8;0.7;0.5;0.6" dur="2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="43" cy="40" rx="3" ry="6" fill="rgba(255, 220, 150, 0.6)">
        <animate attributeName="cy" values="40;37;40;43;40" dur="1.5s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>

  <!-- 炼宝架 -->
  <g transform="translate(45,108)" opacity="0.85">
    <rect x="5" y="20" width="45" height="5" fill="#3a3830" rx="1"/>
    <rect x="5" y="35" width="45" height="5" fill="#3a3830" rx="1"/>
    <rect x="5" y="50" width="45" height="5" fill="#3a3830" rx="1"/>
    <!-- 宝瓶 -->
    <ellipse cx="18" cy="15" rx="8" ry="10" fill="rgba(80, 90, 95, 0.7)"/>
    <ellipse cx="18" cy="8" rx="5" ry="4" fill="rgba(90, 100, 105, 0.6)"/>
    <!-- 灵石 -->
    <ellipse cx="38" cy="30" rx="7" ry="6" fill="rgba(60, 80, 70, 0.7)"/>
    <ellipse cx="38" cy="30" rx="4" ry="3" fill="rgba(80, 120, 100, 0.5)"/>
    <!-- 玉简 -->
    <rect x="25" y="48" width="6" height="18" fill="rgba(70, 80, 75, 0.65)" rx="1" transform="rotate(-8,28,57)"/>
  </g>

  <!-- 齿轮/机关 -->
  <g transform="translate(308,115)" opacity="0.8">
    <circle cx="25" cy="35" r="18" fill="none" stroke="rgba(70, 70, 75, 0.6)" stroke-width="3"/>
    <circle cx="25" cy="35" r="8" fill="rgba(55, 55, 60, 0.6)"/>
    <line x1="25" y1="17" x2="25" y2="25" stroke="rgba(70, 70, 75, 0.5)" stroke-width="2"/>
    <line x1="25" y1="45" x2="25" y2="53" stroke="rgba(70, 70, 75, 0.5)" stroke-width="2"/>
    <line x1="7" y1="35" x2="15" y2="35" stroke="rgba(70, 70, 75, 0.5)" stroke-width="2"/>
    <line x1="35" y1="35" x2="43" y2="35" stroke="rgba(70, 70, 75, 0.5)" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 25 35" to="360 25 35" dur="20s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- 灵气符号 -->
  <g opacity="0.4" filter="url(#glowSoftT)">
    <text x="338" y="85" font-size="12" fill="#a8a898">丹</text>
    <text x="45" y="78" font-size="10" fill="#a8a898">器</text>
  </g>

  <!-- 云雾托起 -->
  <ellipse cx="78" cy="262" rx="68" ry="20" fill="url(#mistGradT1)" filter="url(#cloudFilterT)">
    <animate attributeName="cx" values="78;68;78" dur="8.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="268" rx="85" ry="24" fill="url(#mistGradT2)" filter="url(#cloudFilterT)">
    <animate attributeName="cx" values="200;190;200" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="322" cy="258" rx="58" ry="17" fill="url(#mistGradT1)" filter="url(#cloudFilterT)">
    <animate attributeName="cx" values="322;332;322" dur="7.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 悬浮阴影 -->
  <ellipse cx="200" cy="258" rx="128" ry="10" fill="rgba(10, 18, 22, 0.4)" filter="url(#inkBlurT)">
    <animate attributeName="ry" values="10;6;10" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 灵气光点 -->
  <circle cx="145" cy="112" r="1.2" fill="rgba(200, 180, 150, 0.42)" filter="url(#glowSoftT)">
    <animate attributeName="cy" values="112;105;112" dur="4.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="255" cy="108" r="1" fill="rgba(200, 180, 150, 0.38)" filter="url(#glowSoftT)">
    <animate attributeName="cy" values="108;102;108" dur="5.2s" repeatCount="indefinite"/>
  </circle>
</svg>