<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站 | 欢迎您</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(5px);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #4a4a4a;
            border-bottom: 3px solid #667eea;
            display: inline-block;
            padding-bottom: 10px;
        }
        p {
            line-height: 1.8;
            color: #555;
            margin: 20px 0;
            font-size: 1.1em;
        }
        .highlight {
            color: #667eea;
            font-weight: 600;
        }
        .info {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            margin: 25px 0;
            text-align: left;
        }
        .info p {
            margin: 5px 0;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.3s, transform 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 网站上线啦！</h1>
        <p>欢迎访问 <span class="highlight">我的第一个 Nginx 网站</span></p>
        <div class="info">
            <p>📅 服务器时间：<span id="datetime"></span></p>
            <p>🌐 您的 IP：<span id="ip"></span></p>
            <p>⚙️ Web 服务器：Nginx 1.26.3</p>
        </div>
        <p>如果您看到这个页面，说明 Nginx 配置成功，并且您已经成功替换了默认页面。接下来，您可以在这里展示自己的作品、博客或任何有趣的内容！</p>
        <a href="#" class="btn" onclick="alert('准备好开始您的建站之旅了吗？')">开始探索</a>
        <footer>
            <p>由 ❤️ 和 Nginx 驱动 | 基于 OpenCloudOS</p>
	<p>
		<img src="/beian/20260319/备案图标.png" width="20"/> 
		<a href="https://beian.mps.gov.cn/#/query/webSearch?code=34010402704746" 
			rel="noreferrer" 
			target="_blank">皖公网安备34010402704746号
		</a>
	</p>
	<p>
		<a href="https://beian.miit.gov.cn/#/Integrated/index" 
			rel="noreferrer" 
			target="_blank">皖ICP备2026006516号
		</a>
	</p>
        </footer>
    </div>

    <script>
        // 显示当前时间
        function updateDateTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false 
            };
            document.getElementById('datetime').textContent = now.toLocaleString('zh-CN', options);
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // 获取客户端 IP（通过第三方 API）
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ip').textContent = data.ip;
            })
            .catch(() => {
                document.getElementById('ip').textContent = '无法获取';
            });
    </script>
</body>
</html>
